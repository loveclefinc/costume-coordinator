name = "costume-coordinator-events"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
ALLOWED_ORIGINS = "https://dress.l-clef.com,https://loveclefinc.github.io,http://localhost:3000,http://localhost:5173"
MAX_PHOTOS_PER_COSTUME = "3"
MAX_PHOTO_BYTES = "5242880"
MAX_COSTUMES_PER_PARTICIPANT = "5"
MAX_EVENT_STORAGE_BYTES = "524288000"

[[d1_databases]]
binding = "DB"
database_name = "costume-events"
database_id = "68ab58d4-3024-4bbc-9dcf-2d4304c66c4c"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "costume-event-photos"

[triggers]
crons = ["0 4 * * *"]
