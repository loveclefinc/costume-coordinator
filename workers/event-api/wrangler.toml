name = "costume-coordinator-events"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
ALLOWED_ORIGINS = "https://loveclefinc.github.io,http://localhost:3000,http://localhost:5173"
MAX_PHOTOS_PER_COSTUME = "3"
MAX_PHOTO_BYTES = "5242880"

[[d1_databases]]
binding = "DB"
database_name = "costume-events"
database_id = "00000000-0000-0000-0000-000000000001"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "costume-event-photos"

[triggers]
crons = ["0 4 * * *"]
