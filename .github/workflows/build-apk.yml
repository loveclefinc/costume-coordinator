name: Build and Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with Gradle
        run: |
          pnpm expo prebuild --clean
          cd android
          ./gradlew assembleRelease
          cd ..

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Copy APK to workspace root
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk ./app-release.apk
          ls -lh ./app-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create ${{ github.ref_name }} ./app-release.apk --title "Release ${{ github.ref_name }}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "APK uploaded to GitHub Releases: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

      - name: Notify on Success
        if: success()
        run: |
          echo "✅ APK build successful!"
          echo "Download from: ${{ github.server_url }}/${{ github.repository }}/releases"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ APK build failed!"
          echo "Check logs for details"
