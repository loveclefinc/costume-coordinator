name: Deploy Event API (Cloudflare)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'workers/event-api/**'
      - 'shared/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: workers/event-api/package.json

      - name: Install worker dependencies
        working-directory: workers/event-api
        run: npm install

      - name: Deploy Worker
        working-directory: workers/event-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
